# Runs on every push/PR to main. Catches lint and build failures before deploy.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    env:
      # Dummy values — CI only checks compile, not a live DB connection.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci?schema=public
      BETTER_AUTH_SECRET: ci-build-dummy-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        # Use `npm install` (not `npm ci`): the committed lockfile's overrides
        # representation isn't strict-compatible with `npm ci`, and this matches
        # what the Vercel deploy uses. --ignore-scripts skips postinstall so we
        # run prisma generate explicitly below.
        run: npm install --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  pwa-check:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci?schema=public
      BETTER_AUTH_SECRET: ci-build-dummy-secret-do-not-use-in-production
      BETTER_AUTH_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Start server
        run: npm start &

      - name: Wait for server
        run: npx --yes wait-on@8 http-get://127.0.0.1:3000/login -t 120000

      - name: PWA installability check
        run: npm run check:pwa
